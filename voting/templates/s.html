<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote Submitted</title>
    <style>
        body{
            margin:0;
            padding:0;
            font-family:Arial, sans-serif;
            background:linear-gradient(135deg,#1d3557,#457b9d);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:white;
            width:450px;
            padding:40px;
            text-align:center;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
        }

        .tick{
            font-size:70px;
            color:green;
        }

        h1{
            color:#1d3557;
            margin:15px 0;
        }

        p{
            color:#555;
            font-size:18px;
            margin-bottom:25px;
        }

        .btn{
            display:inline-block;
            padding:12px 25px;
            background:#1d3557;
            color:white;
            text-decoration:none;
            border-radius:8px;
            font-size:16px;
        }

        .btn:hover{
            background:#0f172a;
        }
    </style>
</head>
<body>

    <div class="box">
        <div class="tick">✔</div>
        <h1>Vote Submitted Successfully</h1>
        <p>Thank you for voting. Your vote has been recorded securely.</p>
        <a href="/" class="btn">Go To Home Page</a>
    </div>

</body>
</html>
